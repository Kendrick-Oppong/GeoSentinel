services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geosentinel-postgis
    environment:
      POSTGRES_DB: geosentinel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./infra/docker/init-postgis.sql:/docker-entrypoint-initdb.d/01-init-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geosentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis-data:
